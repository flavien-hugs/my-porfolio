name: CI

on:
  push:
    branches: [main, master, develop, rc/**]
  pull_request:
    branches: [main, master, develop, rc/**]

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Type check
        run: npm run check

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality-check
    if: |
      github.ref == 'refs/heads/main'   ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/rc/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: portfolio-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: docker-build
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
